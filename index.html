<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus_ICT10_Q4Project</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!--LINKS FOR OUR FONTS-->
    <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@400;700&display=swap" rel="stylesheet">

    <py-config>
        packages = ['numpy', 'matplotlib'] <!--NUMPY AND MATPLOTLIB-->
    </py-config>

    <style>
        body { background-color: #FFF2EF; font-family: "Mountains of Christmas", serif; padding-top: 80px; }
        .navbar { background-color: #F7A5A5 !important; z-index: 1000; }
        .nav-link { color: white !important; font-weight: bold; cursor: pointer; border: none; background: none; }
        
       
        .section-page { display: none; } <!--STYLING-->
        .active { display: block !important; }

        .card-custom { background-color: #FFDCDC; border-radius: 20px; padding: 30px; }
        .photo-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .photo-card img { width: 100%; border-radius: 10px; height: 250px; object-fit: cover; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <span class="navbar-brand">Grade 10 - RUBY</span>
        <div class="navbar-nav ms-auto">
            <button class="nav-link px-3" onclick="showPage('home')">Our Section</button>
            <button class="nav-link px-3" onclick="showPage('classmates')">Seatwork 2</button>
            <button class="nav-link px-3" onclick="showPage('tracker')">Skills Test</button>
            <button class="nav-link px-3" onclick="showPage('photos')">Project Photos</button>
        </div>
    </div>
</nav>

<div class="container">
    <div id="home" class="section-page active">
        <div class="card-custom text-center py-5">
            <h1>Welcome to 10-RUBY</h1>
            <p class="lead">ICT 10 Fourth Quarter Portfolio</p>
        </div>
    </div>

    <div id="classmates" class="section-page"> <!--THIS IS WHERE THE USER INPUTS THEIR NAME AND FAV SUBJECT-->
        <div class="card-custom">
            <h3>Classmate Directory</h3>
            <div class="row g-2 mb-4">
                <div class="col-md-5"><input type="text" id="input_name" placeholder="Name" class="form-control"></div>
                <div class="col-md-5"><input type="text" id="input_subject" placeholder="Favorite Subject" class="form-control"></div>
                <div class="col-md-2"><button py-click="add_new_classmate" class="btn btn-dark w-100">Add</button></div>
            </div>
            <div id="output_area" class="bg-white p-3 rounded"></div>
        </div>
    </div>

    <div id="tracker" class="section-page">
        <div class="row"> <!--THIS IS THE ATTENDANCE TRACKER-->
            <div class="col-md-4">
                <div class="card-custom">
                    <h3>Attendance Tracker</h3>
                    <select id="day-select" class="form-select mb-3">
                        <option value="0">Monday</option>
                        <option value="1">Tuesday</option>
                        <option value="2">Wednesday</option>
                        <option value="3">Thursday</option>
                        <option value="4">Friday</option>
                    </select>
                    <input type="number" id="absence-count" class="form-control mb-3" placeholder="0">
                    <button py-click="update_attendance" class="btn w-100 text-white" style="background:#F7A5A5;">Update Graph</button>
                </div>
            </div>
            <div class="col-md-8">
                <div id="graph-inner" class="bg-white p-3 rounded"></div>
            </div>
        </div>
    </div>

    <div id="photos" class="section-page">
        <h3>Class Activities</h3>
        <div class="row"> <!--THIS IS WHERE YOU CAN SEE THE CLASS ACTIVITIES-->
            <div class="col-md-4">
                <div class="photo-card">
                    <img src="https://i.pinimg.com/736x/1f/0c/98/1f0c981ce14fd0e89539b64d62997970.jpg" alt="Science Club">
                    <p>Science Club 25-26!</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="photo-card">
                    <img src="https://i.pinimg.com/736x/ae/bc/e4/aebce492bdda979bcd462248b5dab1bb.jpg" alt="Halloween">
                    <p>OBMC Halloween!!</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="photo-card">
                    <img src="https://i.pinimg.com/736x/47/5c/9e/475c9ed56b81331eec3dfe3b7741b2ca.jpg" alt="Volleyball">
                    <p>Green Hornets Volleyball Girls!</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
   
    function showPage(pageId) {
     
        const pages = document.getElementsByClassName('section-page');
        for (let i = 0; i < pages.length; i++) {
            pages[i].classList.remove('active');
        }
       
        document.getElementById(pageId).classList.add('active');
    }
</script>

<script type="py" src="main.py"></script>
</body>
</html>
